<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mahlwerk 전시 해설 페이지">
  <title>Mahlwerk 전시 해설</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-layer" aria-hidden="true"></div>

  <header class="top-header">
    <p class="brand">MAHLWERK MUSEUM GUIDE</p>
    <h1 id="heroTitle">커피 그라인더 전시 설명</h1>
    <p id="heroSubtitle" class="subtitle">QR을 스캔하면 각 전시물 설명 페이지로 바로 이동합니다.</p>
    <div id="languageSwitch" class="language-switch" role="group" aria-label="언어 전환">
      <button id="langKoButton" type="button" class="language-button is-active" aria-pressed="true">한국어</button>
      <button id="langEnButton" type="button" class="language-button" aria-pressed="false">English</button>
    </div>
  </header>

  <main class="page-shell">
    <section id="loadingView" class="panel center-panel">
      <p id="loadingMessage">설명 데이터를 불러오는 중입니다...</p>
    </section>

    <section id="errorView" class="panel center-panel" hidden>
      <h2 id="errorTitle">불러오기 오류</h2>
      <p id="errorMessage"></p>
      <a id="homeLink" href="./index.html" class="solid-link">처음으로 돌아가기</a>
    </section>

    <section id="listView" class="panel" hidden>
      <div class="section-heading">
        <h2 id="listHeading">전체 설명 목록</h2>
      </div>
      <div id="pageLinks" class="section-list"></div>
    </section>

    <section id="pageView" class="panel" hidden>
      <div class="meta-area">
        <p id="pageBreadcrumb" class="breadcrumb"></p>
        <h2 id="pageTitle"></h2>
      </div>

      <section id="audioArea" class="audio-area" aria-label="오디오 해설">
        <h3 id="audioHeading">오디오 해설</h3>
        <audio id="audioPlayer" controls preload="none"></audio>
        <p id="audioHint" class="muted" hidden>이 페이지의 오디오는 준비 중입니다.</p>
      </section>

      <figure id="imageWrap" class="image-area" hidden>
        <img id="pageImage" alt="전시 이미지" loading="lazy">
        <figcaption id="imageCaption"></figcaption>
      </figure>

      <article id="pageBody" class="body-area"></article>

      <nav id="bottomNavigation" class="bottom-navigation" aria-label="페이지 이동">
        <button id="prevButton" type="button" class="nav-button">이전</button>
        <button id="listButton" type="button" class="nav-button middle">목록</button>
        <button id="nextButton" type="button" class="nav-button">다음</button>
      </nav>
    </section>
  </main>

  <div class="floating-nav" aria-hidden="false">
    <button id="floatingPrev" type="button" class="floating-arrow" aria-label="이전 페이지">&#x2039;</button>
    <button id="floatingNext" type="button" class="floating-arrow" aria-label="다음 페이지">&#x203A;</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
