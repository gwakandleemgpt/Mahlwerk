<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mahlwerk 관리자용 QR 코드 인쇄 페이지">
  <meta name="robots" content="noindex, nofollow">
  <title>Mahlwerk 관리자용 QR 코드 인쇄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="qr.css">
</head>
<body>
  <header class="header">
    <div>
      <p class="eyebrow">ADMIN PRINT</p>
      <h1 id="headerTitle">관리자용 전시 QR 코드 인쇄</h1>
      <p id="headerDesc" class="desc">관리자용 페이지입니다. QR 상단 번호(예: 3-1)를 기준으로 전시물 하단 라벨과 맞춰 붙이면 됩니다.</p>
      <p id="countLine" class="count">총 0개</p>
    </div>
    <div class="header-actions">
      <button id="printButton" type="button">인쇄</button>
      <a id="backLink" href="./index.html">목차 페이지로 이동</a>
    </div>
  </header>

  <main>
    <p id="status" class="status">QR 목록을 준비 중입니다...</p>
    <section id="qrGrid" class="grid" aria-label="QR 코드 목록"></section>
  </main>

  <script type="module" src="qr.js"></script>
</body>
</html>
