<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mahlwerk 전시 QR 코드 모음">
  <title>Mahlwerk QR 코드 모음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="qr.css">
</head>
<body>
  <header class="header">
    <div>
      <p class="eyebrow">PRINTABLE</p>
      <h1>전시 설명 QR 코드 모음</h1>
      <p class="desc">QR 상단 번호(예: 3-1)를 기준으로 전시물 하단 라벨과 맞춰 붙이면 됩니다.</p>
      <p class="count">총 <strong id="totalCount">0개</strong></p>
    </div>
    <div class="header-actions">
      <button id="printButton" type="button">인쇄</button>
      <a href="./index.html">설명 페이지로 이동</a>
    </div>
  </header>

  <main>
    <p id="status" class="status">QR 목록을 준비 중입니다...</p>
    <section id="qrGrid" class="grid" aria-label="QR 코드 목록"></section>
  </main>

  <script type="module" src="qr.js"></script>
</body>
</html>
